name: Release Go Binary

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Semantic version (e.g., 1.0.0-alpha.3 or v1.0.0-alpha.3)'
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: release-go-binary-${{ github.event.inputs.version }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Normalize release tag
        id: version
        shell: bash
        run: |
          raw='${{ github.event.inputs.version }}'
          raw="${raw#refs/tags/}"

          if [[ "$raw" != v* ]]; then
            raw="v$raw"
          fi

          if [[ ! "$raw" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$ ]]; then
            echo "Invalid semantic version tag: $raw" >&2
            exit 1
          fi

          echo "tag=$raw" >> "$GITHUB_OUTPUT"

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'
          cache: true

      - name: Stamp version into source
        shell: bash
        run: |
          tag='${{ steps.version.outputs.tag }}'
          perl -0pi -e "s/var Version = \"[^\"]+\"/var Version = \"${tag}\"/" internal/version/version.go
          git diff -- internal/version/version.go

      - name: Commit stamped version
        shell: bash
        run: |
          git add internal/version/version.go
          if git diff --cached --quiet; then
            echo "Version file already matches requested tag"
            exit 0
          fi
          git -c user.name='github-actions[bot]' -c user.email='41898282+github-actions[bot]@users.noreply.github.com' commit -m "chore: stamp version ${{ steps.version.outputs.tag }}"
          git push origin HEAD:${{ github.ref_name }}

      - name: Create git tag
        run: |
          git tag ${{ steps.version.outputs.tag }}
          git push origin ${{ steps.version.outputs.tag }}

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          version: '~> v2'
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
